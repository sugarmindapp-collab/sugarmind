<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>SugarMind - رفيقك الذكي</title>
  <meta name="description" content="تطبيق سكر مايند - متابعة ذكية لمرضى السكري" />
  <meta name="theme-color" content="#0A0F1C" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    :root{
      --bg:#0A0F1C;
      --bg-elevated:#111827;
      --surface:rgba(255,255,255,0.06);
      --surface-hover:rgba(255,255,255,0.10);
      --border:rgba(255,255,255,0.08);
      --text-primary:#F8FAFC;
      --text-secondary:#8896A4;
      --text-muted:#64748B;
      --primary:#059669;
      --primary-light:#6EE7B7;
      --gold:#FBBF24;
      --warning:#F59E0B;
      --danger:#EF4444;
      --radius:24px;
      --radius-sm:16px;
      --shadow:0 25px 50px -12px rgba(0,0,0,0.6);
      --font-family:'Tajawal',-apple-system,BlinkMacSystemFont,sans-serif;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-family);-webkit-tap-highlight-color:transparent}

    body{
      background:var(--bg);
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
      line-height:1.6;
    }

    .bg-gradient{
      position:fixed;
      inset:0;
      background:radial-gradient(ellipse at 100% 0%, rgba(5,150,105,0.12) 0%, transparent 50%),
                 radial-gradient(ellipse at 0% 100%, rgba(59,130,246,0.06) 0%, transparent 40%),
                 var(--bg);
      z-index:-1;
    }

    .app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:120px}

    /* ===== ONBOARDING ===== */
    .onboarding{
      position:fixed;
      inset:0;
      z-index:10000;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
      text-align:center;
    }

    .onboarding.hidden{display:none}

    .onboarding-logo{
      width:120px;
      height:120px;
      border-radius:32px;
      background:linear-gradient(145deg,var(--surface),rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:64px;
      margin-bottom:32px;
      box-shadow:0 0 50px rgba(5,150,105,0.25);
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .onboarding h2{
      font-size:28px;
      font-weight:900;
      margin-bottom:8px;
    }

    .onboarding > p{
      color:var(--text-secondary);
      margin-bottom:24px;
    }

    .setup-input{
      width:100%;
      background:var(--surface);
      border:2px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      color:var(--text-primary);
      font-size:18px;
      text-align:center;
      margin-bottom:16px;
    }

    .setup-input:focus{
      outline:none;
      border-color:var(--primary);
    }

    .setup-select{
      width:100%;
      background:var(--surface);
      border:2px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      color:var(--text-primary);
      font-size:16px;
      margin-bottom:24px;
    }

    /* ===== FRIEND CARD (البطاقة الحية) ===== */
    .friend-card{
      margin:20px;
      background:linear-gradient(145deg,var(--surface),rgba(255,255,255,0.03));
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
    }

    .friend-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .friend-avatar{
      width:56px;
      height:56px;
      border-radius:20px;
      background:linear-gradient(135deg,var(--primary),var(--primary-light));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      color:#fff;
      box-shadow:0 8px 25px rgba(5,150,105,0.35);
    }

    .friend-name{
      font-size:20px;
      font-weight:900;
    }

    .friend-streak{
      font-size:13px;
      color:var(--primary-light);
      font-weight:700;
    }

    .last-reading{
      background:rgba(5,150,105,0.1);
      border:1px solid rgba(5,150,105,0.2);
      border-radius:var(--radius-sm);
      padding:20px;
      text-align:center;
      margin-bottom:16px;
    }

    .reading-big{
      font-size:56px;
      font-weight:900;
      color:var(--text-primary);
    }

    .reading-time{
      font-size:13px;
      color:var(--text-secondary);
      margin-top:4px;
    }

    .trend-mini{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      background:var(--surface);
      border-radius:var(--radius-sm);
    }

    .trend-dots{
      display:flex;
      gap:6px;
    }

    .trend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--border);
    }

    .trend-dot.good{background:var(--primary)}
    .trend-dot.warning{background:var(--warning)}
    .trend-dot.danger{background:var(--danger)}

    /* ===== SMART GREETING ===== */
    .smart-greeting{
      padding:0 20px 16px;
      text-align:center;
    }

    .greeting-text{
      font-size:24px;
      font-weight:900;
      line-height:1.4;
      margin-bottom:8px;
    }

    .greeting-context{
      font-size:14px;
      color:var(--text-secondary);
    }

    /* ===== MAIN ACTION ===== */
    .main-action{
      padding:0 20px;
      margin-bottom:20px;
    }

    .btn-primary{
      width:100%;
      padding:22px 24px;
      border-radius:var(--radius);
      background:linear-gradient(135deg,var(--primary),#047857);
      border:none;
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      box-shadow:0 8px 30px rgba(5,150,105,0.35);
      transition:all 0.3s ease;
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 40px rgba(5,150,105,0.45);
    }

    /* ===== INPUT SHEET ===== */
    .input-sheet{
      position:fixed;
      inset:0;
      z-index:2000;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(8px);
      opacity:0;
      transition:opacity 0.3s ease;
    }

    .input-sheet.show{
      display:flex;
      opacity:1;
    }

    .sheet-content{
      background:var(--bg-elevated);
      border:1px solid var(--border);
      border-radius:var(--radius) var(--radius) 0 0;
      padding:24px;
      width:100%;
      max-width:480px;
      transform:translateY(100%);
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .input-sheet.show .sheet-content{
      transform:translateY(0);
    }

    .sheet-handle{
      width:40px;
      height:4px;
      background:var(--border);
      border-radius:2px;
      margin:0 auto 20px;
    }

    .sheet-title{
      font-size:20px;
      font-weight:900;
      text-align:center;
      margin-bottom:20px;
    }

    .reading-input{
      width:100%;
      background:var(--surface);
      border:2px solid var(--border);
      border-radius:var(--radius-sm);
      padding:24px;
      color:var(--text-primary);
      font-size:36px;
      font-weight:900;
      text-align:center;
      margin-bottom:16px;
    }

    .reading-input:focus{
      outline:none;
      border-color:var(--primary);
    }

    /* ===== WISDOM CARD ===== */
    .wisdom-card{
      margin:0 20px 20px;
      background:var(--surface);
      border:2px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
      display:none;
    }

    .wisdom-card.show{display:block;animation:slideUp 0.4s ease}

    @keyframes slideUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    .wisdom-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .wisdom-reading{
      font-size:40px;
      font-weight:900;
    }

    .wisdom-status{
      padding:8px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
    }

    .wisdom-status.excellent{background:rgba(5,150,105,0.2);color:var(--primary-light)}
    .wisdom-status.good{background:rgba(251,191,36,0.2);color:var(--gold)}
    .wisdom-status.warning{background:rgba(245,158,11,0.2);color:var(--warning)}
    .wisdom-status.danger{background:rgba(239,68,68,0.2);color:var(--danger)}

    .wisdom-text{
      font-size:15px;
      line-height:1.9;
      color:var(--text-secondary);
      margin-bottom:16px;
    }

    .wisdom-text strong{color:var(--text-primary)}

    /* ===== TOOLS ===== */
    .tools{
      padding:0 20px;
    }

    .tools-title{
      font-size:14px;
      color:var(--text-secondary);
      margin-bottom:12px;
      text-align:center;
    }

    .tools-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .tool{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:16px;
      text-align:center;
      text-decoration:none;
      color:inherit;
    }

    .tool-icon{
      font-size:28px;
      margin-bottom:8px;
    }

    .tool-label{
      font-size:12px;
      font-weight:700;
      color:var(--text-secondary);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:rgba(10,15,28,0.95);
      backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:12px 20px calc(12px + env(safe-area-inset-bottom));
      z-index:90;
    }

    .nav-inner{
      max-width:480px;
      margin:0 auto;
      display:flex;
      justify-content:space-around;
    }

    .nav-item{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      padding:8px 24px;
      color:var(--text-secondary);
      text-decoration:none;
      font-size:11px;
      font-weight:700;
    }

    .nav-item.active{color:var(--primary-light)}

    .nav-item span:first-child{font-size:24px}

    /* ===== TOAST ===== */
    .toast-stack{
      position:fixed;
      bottom:100px;
      left:50%;
      transform:translateX(-50%);
      z-index:10001;
      display:flex;
      flex-direction:column;
      gap:8px;
      pointer-events:none;
    }

    .toast{
      background:rgba(255,255,255,0.96);
      color:var(--bg);
      padding:14px 20px;
      border-radius:12px;
      font-weight:800;
      font-size:14px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      animation:toastPop 0.4s ease;
    }

    @keyframes toastPop{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <!-- Toast Stack -->
  <div class="toast-stack" id="toastStack"></div>

  <!-- Onboarding (يظهر مرة واحدة) -->
  <div class="onboarding" id="onboarding">
    <div class="onboarding-logo">🧠</div>
    <h2>هلا! 👋</h2>
    <p>خلّني أعرفك عشان أكون رفيقك اليومي</p>
    <input type="text" id="setupName" class="setup-input" placeholder="اسمك؟ (مثال: أحمد)" maxlength="20" />
    <select id="setupGoal" class="setup-select">
      <option value="follow">📊 متابعة يومية</option>
      <option value="control">🎯 ضبط السكر</option>
      <option value="learn">📚 تعلم أساسيات</option>
    </select>
    <button class="btn-primary" onclick="completeSetup()">ابدأ رحلتي 🚀</button>
  </div>

  <!-- Input Sheet -->
  <div class="input-sheet" id="inputSheet" onclick="closeSheet(event)">
    <div class="sheet-content" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title" id="sheetTitle">سجل قراءتك ⚡</h3>
      <input type="number" id="readingInput" class="reading-input" placeholder="---" min="30" max="600" />
      <button class="btn-primary" onclick="saveReading()">احفظ واشرح لي 💡</button>
    </div>
  </div>

  <div class="app" id="mainApp" style="display:none">
    <!-- Friend Card (البطاقة الحية) -->
    <div class="friend-card" id="friendCard">
      <div class="friend-header">
        <div class="friend-avatar" id="friendAvatar">👤</div>
        <div>
          <div class="friend-name" id="friendName">---</div>
          <div class="friend-streak" id="friendStreak">🔥 يوم 1</div>
        </div>
      </div>
      
      <div class="last-reading" id="lastReading">
        <div class="reading-big" id="readingBig">---</div>
        <div class="reading-time" id="readingTime">سجل أول قراءة اليوم</div>
      </div>
      
      <div class="trend-mini">
        <span>📊 آخر 3 قراءات</span>
        <div class="trend-dots" id="trendDots">
          <div class="trend-dot"></div>
          <div class="trend-dot"></div>
          <div class="trend-dot"></div>
        </div>
      </div>
    </div>

    <!-- Smart Greeting -->
    <div class="smart-greeting">
      <div class="greeting-text" id="greetingText">صباحك ورد</div>
      <div class="greeting-context" id="greetingContext">جهز رقمك ونشرح لك وضعك</div>
    </div>

    <!-- Main Action -->
    <div class="main-action">
      <button class="btn-primary" id="mainBtn" onclick="openSheet()">
        <span>🩸</span>
        <span>سجل رقم سكرك</span>
      </button>
    </div>

    <!-- Wisdom Card -->
    <div class="wisdom-card" id="wisdomCard">
      <div class="wisdom-header">
        <div class="wisdom-reading" id="wisdomReading">128</div>
        <div class="wisdom-status excellent" id="wisdomStatus">🌟 ممتاز</div>
      </div>
      <div class="wisdom-text" id="wisdomText">
        <!-- يُملأ بالذكاء -->
      </div>
    </div>

    <!-- Tools -->
    <div class="tools">
      <div class="tools-title">أدواتك</div>
      <div class="tools-grid">
        <a href="meal-analyzer.html" class="tool">
          <div class="tool-icon">🍽️</div>
          <div class="tool-label">الوجبة</div>
        </a>
        <a href="carb-calculator.html" class="tool">
          <div class="tool-icon">🧮</div>
          <div class="tool-label">المعامل</div>
        </a>
        <a href="daily-guide.html" class="tool">
          <div class="tool-icon">📋</div>
          <div class="tool-label">دليلي</div>
        </a>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-inner">
      <a href="#" class="nav-item active">
        <span>🏠</span>
        <span>الرئيسية</span>
      </a>
      <a href="daily-guide.html" class="nav-item">
        <span>📋</span>
        <span>دليلي</span>
      </a>
    </div>
  </nav>

  <script>
    // ===== STORAGE =====
    const USER_KEY = 'sugarmind_user_v1';
    const READINGS_KEY = 'sugarmind_readings_v1';

    // ===== STATE =====
    let user = null;

    // ===== INIT =====
    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadUser();
      if (saved && saved.name) {
        // User exists
        user = saved;
        showMainApp();
      } else {
        // New user
        document.getElementById('onboarding').classList.remove('hidden');
      }
    });

    // ===== USER MANAGEMENT =====
    function loadUser() {
      try {
        return JSON.parse(localStorage.getItem(USER_KEY));
      } catch(e) { return null; }
    }

    function saveUser(data) {
      user = data;
      localStorage.setItem(USER_KEY, JSON.stringify(data));
    }

    function completeSetup() {
      const name = document.getElementById('setupName').value.trim();
      const goal = document.getElementById('setupGoal').value;
      
      if (!name) {
        showToast('اكتب اسمك الأول 😊');
        return;
      }
      
      saveUser({
        name,
        goal,
        createdAt: new Date().toISOString(),
        streak: 1,
        lastActive: new Date().toDateString()
      });
      
      document.getElementById('onboarding').classList.add('hidden');
      showMainApp();
      showToast(`هلا والله يا ${name}! 🎉`);
    }

    // ===== MAIN APP =====
    function showMainApp() {
      document.getElementById('mainApp').style.display = 'block';
      updateFriendCard();
      updateSmartGreeting();
    }

    function updateFriendCard() {
      if (!user) return;
      
      // Avatar with first letter
      document.getElementById('friendAvatar').textContent = user.name[0];
      document.getElementById('friendName').textContent = user.name;
      
      // Streak
      const streak = calculateStreak();
      document.getElementById('friendStreak').textContent = `🔥 ${streak} يوم`;
      
      // Last reading
      const history = getHistory();
      if (history.length > 0) {
        const last = history[0];
        document.getElementById('readingBig').textContent = last.reading;
        document.getElementById('readingTime').textContent = `آخر قراءة: ${last.time}`;
        
        // Update trend dots
        updateTrendDots(history.slice(0, 3));
      }
    }

    function calculateStreak() {
      // Simplified streak calculation
      const history = getHistory();
      if (history.length === 0) return 1;
      
      // Check if active today
      const today = new Date().toDateString();
      const todayReadings = history.filter(h => new Date(h.date).toDateString() === today);
      
      if (todayReadings.length > 0) {
        return (user.streak || 1);
      }
      return user.streak || 1;
    }

    function updateTrendDots(lastThree) {
      const dots = document.querySelectorAll('.trend-dot');
      lastThree.forEach((reading, i) => {
        if (dots[2-i]) {
          const val = parseInt(reading.reading);
          dots[2-i].className = 'trend-dot ' + getStatusClass(val);
        }
      });
    }

    function getStatusClass(val) {
      if (val < 80) return 'danger';
      if (val <= 140) return 'good';
      if (val <= 180) return 'warning';
      return 'danger';
    }

    // ===== SMART GREETING =====
    function updateSmartGreeting() {
      const hour = new Date().getHours();
      const history = getHistory();
      const today = new Date().toDateString();
      const todayCount = history.filter(h => new Date(h.date).toDateString() === today).length;
      
      let greeting = `صباحك ورد يا ${user.name} 🌹`;
      let context = 'سجل قراءتك ونشرح لك';
      let btnText = 'سجل رقم سكرك';
      
      if (todayCount === 0) {
        // First reading of day
        if (hour >= 5 && hour < 11) {
          greeting = `صباحك ورد يا ${user.name} 🌹`;
          context = 'وقت قراءة الصيام';
          btnText = 'سجل صيامك';
        } else if (hour >= 11 && hour < 15) {
          greeting = 'جاهز للغداء؟';
          context = 'سجل قبل الأكل';
          btnText = 'سجل قراءة';
        }
      } else if (todayCount === 1) {
        greeting = 'كمل يومك 💪';
        context = 'سجل بعد الوجبة بساعتين';
        btnText = 'سجل القراءة الثانية';
      } else {
        greeting = `يومك ممتاز يا ${user.name}! 🌟`;
        context = `${todayCount} قراءات اليوم`;
        btnText = 'سجل كمان';
      }
      
      document.getElementById('greetingText').textContent = greeting;
      document.getElementById('greetingContext').textContent = context;
      document.getElementById('mainBtn').innerHTML = `<span>🩸</span><span>${btnText}</span>`;
    }

    // ===== READINGS =====
    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(READINGS_KEY) || '[]');
      } catch(e) { return []; }
    }

    function saveToHistory(reading) {
      const history = getHistory();
      history.unshift({
        reading,
        time: new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}),
        date: new Date().toISOString(),
        id: Date.now()
      });
      if (history.length > 30) history.pop();
      localStorage.setItem(READINGS_KEY, JSON.stringify(history));
      
      // Update streak
      const today = new Date().toDateString();
      if (user.lastActive !== today) {
        user.streak = (user.streak || 0) + 1;
        user.lastActive = today;
        saveUser(user);
      }
    }

    // ===== INPUT SHEET =====
    function openSheet() {
      document.getElementById('inputSheet').classList.add('show');
      setTimeout(() => document.getElementById('readingInput').focus(), 100);
    }

    function closeSheet(e) {
      if (e.target === e.currentTarget) {
        document.getElementById('inputSheet').classList.remove('show');
      }
    }

    document.getElementById('readingInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveReading();
    });

    function saveReading() {
      const reading = parseInt(document.getElementById('readingInput').value);
      
      if (!reading || reading < 30 || reading > 600) {
        showToast('أدخل رقم صحيح بين 30 و 600', '⚠️');
        return;
      }
      
      // Save
      saveToHistory(reading);
      
      // Close sheet
      document.getElementById('inputSheet').classList.remove('show');
      document.getElementById('readingInput').value = '';
      
      // Update UI
      updateFriendCard();
      updateSmartGreeting();
      showWisdom(reading);
      
      showToast('تم الحفظ! 🎉');
      
      // Confetti for good readings
      if (reading >= 80 && reading <= 160) {
        confetti({
          particleCount: 60,
          spread: 50,
          origin: {y: 0.6},
          colors: ['#059669', '#6EE7B7', '#FBBF24']
        });
      }
    }

    // ===== WISDOM =====
    function showWisdom(reading) {
      const card = document.getElementById('wisdomCard');
      const readingEl = document.getElementById('wisdomReading');
      const statusEl = document.getElementById('wisdomStatus');
      const textEl = document.getElementById('wisdomText');
      
      readingEl.textContent = reading;
      
      let status = { class: '', text: '' };
      let message = '';
      
      if (reading < 70) {
        status = { class: 'danger', text: '⚠️ منخفض' };
        message = `<strong>يا ${user.name}، رقمك أقل من 70.</strong><br><br>
        هذا <strong>هبوط</strong> - خذ 3 تمرات <strong>الآن</strong> وقِس بعد 15 دقيقة.<br><br>
        💡 غالباً: جرعة زيادة، تأخير أكل، أو مجهود.`;
      } else if (reading < 80) {
        status = { class: 'warning', text: '⚡ انتباه' };
        message = `<strong>${user.name}، رقمك زين بس قريب من الحد.</strong><br><br>
        خذ تمرة احتياط واستمر في متابعتك. أنت قدها 👊`;
      } else if (reading <= 140) {
        status = { class: 'excellent', text: '🌟 ممتاز' };
        message = `<strong>يا سلام يا ${user.name}! 🎉</strong><br><br>
        <strong>${reading}</strong> في النطاق الذهبي!<br><br>
        ✅ جسمك يستجيب كويس<br>
        ✅ إدارتك ممتازة<br><br>
        <strong>استمر على نفس النمط 💪</strong>`;
      } else if (reading <= 180) {
        status = { class: 'good', text: '📊 جيد' };
        message = `<strong>${user.name}، رقمك أعلى شوي.</strong><br><br>
        🤔 غالباً: وجبة ثقيلة أو تأخير في الجرعة.<br><br>
        🚶 امشِ 10 دقايق الآن، وراجع آخر وجبة في <strong>المحلل</strong>.`;
      } else {
        status = { class: 'danger', text: '⚠️ مرتفع' };
        message = `<strong>${user.name}، رقمك يحتاج مراجعة.</strong><br><br>
        🔍 راجع: آخر وجبة، جرعتك، نشاطك.<br><br>
        💧 اشرب ماء، امشِ 15 دقيقة، وقِس بعد ساعتين.<br>
        🧮 جرب <strong>حاسب المعامل</strong> لو مستمر.`;
      }
      
      statusEl.className = 'wisdom-status ' + status.class;
      statusEl.textContent = status.text;
      textEl.innerHTML = message;
      
      card.classList.add('show');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ===== TOAST =====
    function showToast(msg, icon='✨') {
      const stack = document.getElementById('toastStack');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span>${icon}</span> ${msg}`;
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }
  </script>
</body>
</html>
